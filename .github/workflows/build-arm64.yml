name: Build Ghidra ARM64 Variants

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-arm64:
    name: Build for ${{ matrix.platform_name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_name: linux_arm_64
          - os: macos-14
            platform_name: mac_arm_64
          - os: windows-latest
            platform_name: win_arm_64

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Read Ghidra JDK Version
        shell: bash
        run: |
          # Strip Windows carriage returns to avoid string parsing mismatches inside gradlew shell scripts
          tr -d '\r' < Ghidra/application.properties > Ghidra/application.properties.tmp
          mv Ghidra/application.properties.tmp Ghidra/application.properties
          MIN_VER=$(awk -F'=' '$1=="application.java.min" {print $2}' Ghidra/application.properties | tr -d '[:space:]')
          echo "JDK_VER=${MIN_VER:-17}" >> $GITHUB_ENV

      - name: Set up Java Development Kit
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '${{ env.JDK_VER }}'

      - name: Install Native Toolchain Dependencies (Linux Cross-Compilation)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static binfmt-support

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          dependency-graph: 'disabled'

      - name: Fetch Dependencies
        shell: bash
        env:
          PROTOC_ARCH: ${{ matrix.os == 'ubuntu-latest' && '-PprotocPlatform=linux-x86_64' || '' }}
        run: |
          ./gradlew -I gradle/support/fetchDependencies.gradle -DhideDownloadProgress -DnoEclipse $PROTOC_ARCH

      - name: Build Ghidra Distribution Package
        env:
          CC: ${{ matrix.platform_name == 'linux_arm_64' && 'aarch64-linux-gnu-gcc' || '' }}
          CXX: ${{ matrix.platform_name == 'linux_arm_64' && 'aarch64-linux-gnu-g++' || '' }}
          PROTOC_ARCH: ${{ matrix.os == 'ubuntu-latest' && '-PprotocPlatform=linux-x86_64' || '' }}
        shell: bash
        run: |
          ./gradlew buildGhidra -PcurrentPlatformName=${{ matrix.platform_name }} $PROTOC_ARCH --no-daemon

      - name: Locate and Upload Distribution Zip
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-distribution-${{ matrix.platform_name }}
          path: "**/build/dist/*.zip"
          if-no-files-found: error

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "**/build/dist/*.zip"
          generate_release_notes: true

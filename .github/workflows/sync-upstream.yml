name: Sync Upstream Fork

on:
  schedule:
    - cron: '0 0 * * 0' # Runs weekly on Sunday at midnight UTC
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to sync the branch
    steps:
      - name: Sync Fork
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "Syncing repository with official upstream..."
          gh repo sync ${{ github.repository }} --branch main --source NationalSecurityAgency/ghidra
